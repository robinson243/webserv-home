# serveur par défaut
server {
    listen 80;
    server_name default.com;

    root /var/www/default;
    index index.html;

    client_max_body_size 1000000;

    error_page 404 /404.html;

    location / {
        allow_methods GET POST;
        autoindex off;
    }
}

# serveur avec plusieurs server_name
server {
    listen 80;
    server_name site1.com www.site1.com blog.site1.com;

    root /var/www/site1;
    index index.html index.htm;

    client_max_body_size 2000000;

    error_page 404 /errors/404.html;
    error_page 500 /errors/500.html;

    location / {
        allow_methods GET POST DELETE;
        autoindex on;
    }

    location /images {
        root /var/www/site1/images;
        allow_methods GET;
    }

    location /upload {
        allow_methods POST;
        upload_path /tmp/uploads;
    }
}

# serveur sur un autre port
server {
    listen 8080;
    server_name test.com;

    root /var/www/test;
    index index.html;

    location / {
        allow_methods GET;
    }
}

# serveur avec host identique (test default server)
server {
    listen 80;
    server_name site1.com;

    root /var/www/duplicate;
    index index.html;

    location / {
        allow_methods GET;
    }
}
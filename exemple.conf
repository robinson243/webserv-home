server {
    listen 127.0.0.1:8080;
    server_name default.com;

    root /var/www/default;
    index index.html;

    client_max_body_size 1000000;

    error_page 404 /404.html;

    location / {
        allow_methods GET POST;
        autoindex off;
    }
}

server {
    listen 127.0.0.1:8081;
    server_name site1.com www.site1.com blog.site1.com;

    root /var/www/site1;
    index index.html index.htm;

    client_max_body_size 2000000;

    error_page 404 /errors/404.html;
    error_page 500 /errors/500.html;

    location / {
        allow_methods GET POST DELETE;
        autoindex on;
    }

    location /images {
        root /var/www/site1/images;
        allow_methods GET;
    }

    location /upload {
        allow_methods POST;
        client_max_body_size 5000000;
    }
}

server {
    listen 127.0.0.1:8082;
    server_name test.com;

    root /var/www/test;
    index index.html;

    location / {
        allow_methods GET;
    }
}

server {
    listen 127.0.0.1:9090;
    server_name example.com www.example.com;

    root /var/www/example;
    index index.html index.htm;

    client_max_body_size 1000000;

    error_page 404 /errors/404.html;
    error_page 500 /errors/500.html;

    location / {
        allow_methods GET POST;
        autoindex off;
    }

    location /images {
        root /var/www/example/images;
        autoindex on;
        allow_methods GET;
    }

    location /upload {
        root /var/www/uploads;
        allow_methods POST;
        client_max_body_size 5000000;
    }

    location /api {
        allow_methods GET POST DELETE;
        client_max_body_size 2000000;
    }
}

server {
    listen 127.0.0.1:8000;
    server_name api.local;

    root /var/www/api;
    index index.html;

    location / {
        allow_methods GET POST;
    }
}

server {
    listen 127.0.0.1:8080;
    server_name duplicate.com;

    root /var/www/duplicate;
    index index.html;

    location / {
        allow_methods GET;
    }
}

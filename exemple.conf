# serveur par défaut
server {
    listen 127.0.0.1:80;
    server_name default.com;

    root /var/www/default;
    index index.html;

    client_max_body_size 1000000;

    error_page 404 /404.html;

    location / {
        allow_methods GET POST;
        autoindex off;
    }
}

